<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>דשבורד חברות ניהול</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'SF Hebrew', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #162d56; color: #0f172a; direction: rtl; min-height: 100vh; }

/* ── Topbar ── */
.topbar {
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  padding: 0 32px;
  height: 64px;
  display: flex;
  align-items: center;
  gap: 20px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { display: flex; align-items: center; }
.logo-img { height: 32px; width: auto; display: block; }
.topbar-mid { flex: 1; display: flex; align-items: center; gap: 8px; }
#search {
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid #e2e8f0;
  font-size: 0.875rem;
  width: 240px;
  direction: rtl;
  outline: none;
  font-family: inherit;
  background: #f8fafc;
  transition: border-color .15s, background .15s;
}
#search:focus { border-color: #1d4ed8; background: #fff; }
.chips { display: flex; gap: 6px; }
.chip {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid #e2e8f0;
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  background: #fff;
  color: #64748b;
  transition: all .12s;
  white-space: nowrap;
  font-family: inherit;
}
.chip:hover { border-color: #1d4ed8; color: #1d4ed8; }
.chip.active { background: #1d4ed8; border-color: #1d4ed8; color: #fff; }
#stats { font-size: 0.78rem; color: #94a3b8; white-space: nowrap; margin-right: auto; }

/* ── Grid ── */
.page { padding: 28px 32px 48px; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 20px;
}

/* ── Card ── */
.card {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,.18);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: transform .15s, box-shadow .15s;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.25); }

  border: 1px solid rgba(255,255,255,0.22);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem;
  font-weight: 700;
  flex-shrink: 0;
  backdrop-filter: blur(4px);
}
.card-title { font-size: 1rem; font-weight: 700; color: #fff; flex: 1; line-height: 1.35; }
.card-stats { display: flex; gap: 10px; font-size: 0.72rem; color: rgba(255,255,255,0.65); margin-top: 4px; }
.card-stat { display: flex; align-items: center; gap: 4px; }

/* ── Projects inside card ── */
.proj-list { padding: 4px 0; flex: 1; }

.proj-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 18px;
  cursor: pointer;
  transition: background .1s;
  border-bottom: 1px solid #f1f5f9;
}
.proj-row:last-of-type { border-bottom: none; }
.proj-row:hover { background: #f8fafc; }

.proj-bcount {
  min-width: 38px;
  text-align: center;
  font-size: 0.75rem;
  font-weight: 600;
  color: #475569;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}
.proj-bcount .bnum { font-size: 1rem; font-weight: 700; color: #1e293b; line-height: 1; }

.sdot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.proj-name {
  font-size: 0.85rem;
  font-weight: 600;
  color: #1e293b;
  flex: 1;
  line-height: 1.35;
}
.proj-badges { display: flex; gap: 5px; margin-top: 4px; flex-wrap: wrap; }
.badge {
  font-size: 0.65rem;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 10px;
  white-space: nowrap;
}
.b-active   { background: #dcfce7; color: #15803d; }
.b-inactive { background: #f1f5f9; color: #64748b; }
.b-demo     { background: #eff6ff; color: #1d4ed8; }
.b-archive  { background: #fef3c7; color: #b45309; }
.b-type     { background: #f0f9ff; color: #0284c7; }
.b-city     { background: #f5f3ff; color: #6d28d9; }

/* ── Expanded buildings ── */
.bld-list {
  display: none;
  background: #f8fafc;
  border-top: 1px solid #f1f5f9;
  padding: 4px 0 4px 0;
}
.bld-list.open { display: block; }
.bld-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 20px 6px 32px;
  font-size: 0.82rem;
  color: #475569;
}
.bld-row:hover { background: #f1f5f9; }
.bld-dot { width: 5px; height: 5px; border-radius: 50%; background: #cbd5e1; flex-shrink: 0; }
.bld-city { font-size: 0.7rem; color: #94a3b8; margin-right: auto; }

.show-more {
  padding: 8px 20px 12px;
  font-size: 0.78rem;
  color: #1d4ed8;
  cursor: pointer;
  font-weight: 500;
}
.show-more:hover { text-decoration: underline; }

.no-results {
  text-align: center;
  padding: 80px 20px;
  color: #94a3b8;
  font-size: 0.95rem;
}

/* ── Infographic ── */
#infographic { padding: 20px 32px 0; }

.kpi-row {
  display: flex;
  gap: 14px;
  margin-bottom: 14px;
}
.kpi-card {
  flex: 1;
  background: rgba(255,255,255,0.10);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 12px;
  padding: 18px 22px;
  color: #fff;
  backdrop-filter: blur(4px);
}
.kpi-num {
  font-size: 2rem;
  font-weight: 700;
  line-height: 1;
  letter-spacing: -.02em;
}
.kpi-label {
  font-size: 0.75rem;
  color: rgba(255,255,255,0.60);
  margin-top: 5px;
}
.kpi-icon { font-size: 1.3rem; margin-bottom: 6px; }

.charts-row {
  display: flex;
  gap: 14px;
  margin-bottom: 20px;
}
.chart-box {
  background: rgba(255,255,255,0.10);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 12px;
  padding: 18px 20px;
  color: #fff;
  backdrop-filter: blur(4px);
  overflow: hidden;
}
.chart-box h3 {
  font-size: 0.78rem;
  font-weight: 600;
  color: rgba(255,255,255,0.70);
  margin-bottom: 14px;
  text-transform: uppercase;
  letter-spacing: .04em;
}
#chart-bar   { flex: 2; min-width: 0; }
#chart-pie   { flex: 1.2; min-width: 0; }
#chart-gauge { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: center; }
#chart-cities { flex: 1; min-width: 0; }

.pie-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 14px;
  margin-top: 12px;
  font-size: 0.72rem;
  color: rgba(255,255,255,0.75);
}
.pie-legend-item { display: flex; align-items: center; gap: 5px; }
.pie-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>

let activeFilter = 'all';
let searchQ = '';

function getFiltered() {
  return DATA
    .map(co => ({
      ...co,
      totalBuildings: co.projects.reduce((s,p) => s + p.buildings.length, 0),
      projects: co.projects.filter(p => {
        if (activeFilter !== 'all' && p.status !== activeFilter) return false;
        if (!searchQ) return true;
        const q = searchQ.toLowerCase();
        return co.company.toLowerCase().includes(q)
          || p.name.toLowerCase().includes(q)
          || p.cities.some(c => c.toLowerCase().includes(q))
          || p.buildings.some(b => b.name.toLowerCase().includes(q));
      })
    }))
    .filter(co => co.projects.length > 0);
}

/* ── Chart helpers ── */
function arcPath(cx, cy, r, a1, a2) {
  const toR = d => d * Math.PI / 180;
  const x1 = cx + r * Math.cos(toR(a1)), y1 = cy + r * Math.sin(toR(a1));
  const x2 = cx + r * Math.cos(toR(a2)), y2 = cy + r * Math.sin(toR(a2));
  return `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${(a2-a1)>180?1:0} 1 ${x2} ${y2} Z`;
}
function arcStroke(cx, cy, r, a1, a2) {
  const toR = d => d * Math.PI / 180;
  const x1 = cx + r * Math.cos(toR(a1)), y1 = cy + r * Math.sin(toR(a1));
  const x2 = cx + r * Math.cos(toR(a2)), y2 = cy + r * Math.sin(toR(a2));
  return `M ${x1} ${y1} A ${r} ${r} 0 ${(a2-a1)>180?1:0} 1 ${x2} ${y2}`;
}
const ST_COLOR = {'פעיל':'#22c55e','לא פעיל':'#94a3b8','דמו':'#3b82f6','ארכיון':'#f59e0b'};

function renderCharts(data) {
  const totalCo   = data.length;
  const totalProj = data.reduce((s, co) => s + co.projects.length, 0);
  const totalBld  = data.reduce((s, co) => s + co.totalBuildings, 0);
  const activeCnt = data.reduce((s, co) => s + co.projects.filter(p => p.status === 'פעיל').length, 0);
  const activePct = totalProj ? Math.round(activeCnt / totalProj * 100) : 0;

  document.getElementById('kpi-companies').textContent = totalCo;
  document.getElementById('kpi-projects').textContent  = totalProj;
  document.getElementById('kpi-buildings').textContent = totalBld;
  document.getElementById('kpi-active').textContent    = activePct + '%';

  /* Bar chart */
  const barBox = document.getElementById('chart-bar');
  const top8   = [...data].sort((a,b) => b.totalBuildings - a.totalBuildings).slice(0, 8);
  const maxB   = top8[0]?.totalBuildings || 1;
  let bHtml = '<div style="display:flex;flex-direction:column;gap:8px;padding:4px 0">';
  top8.forEach(co => {
    const pct = Math.max(2, (co.totalBuildings / maxB) * 100);
    const nm  = co.company.replace(/\s*\|.*/, '').trim();
    bHtml += `<div style="display:flex;align-items:center;gap:8px;direction:rtl;font-family:'SF Hebrew',-apple-system,BlinkMacSystemFont,sans-serif">
      <span style="flex:0 0 130px;font-size:11px;color:rgba(255,255,255,0.80);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${nm}</span>
      <div style="flex:1;position:relative;height:20px"><div style="width:${pct}%;height:100%;background:#3b82f6;opacity:0.85;border-radius:4px;min-width:4px"></div></div>
      <span style="flex:0 0 28px;font-size:10px;color:rgba(255,255,255,0.55);text-align:left">${co.totalBuildings}</span>
    </div>`;
  });
  bHtml += '</div>';
  barBox.querySelector('div.bar-wrap')?.remove();
  const wrap = document.createElement('div');
  wrap.className = 'bar-wrap';
  wrap.innerHTML = bHtml;
  barBox.appendChild(wrap);

  /* Pie chart */
  const pieBox = document.getElementById('chart-pie');
  const counts = {};
  data.forEach(co => co.projects.forEach(p => counts[p.status] = (counts[p.status]||0)+1));
  const statuses = Object.keys(counts);
  const tot = statuses.reduce((s, k) => s + counts[k], 0) || 1;
  const cx = 70, cy = 70, r = 58;
  let pSvg = `<svg width="140" height="140" viewBox="0 0 140 140">`;
  let ang = -90;
  statuses.forEach(st => {
    const sweep = (counts[st] / tot) * 360;
    const col   = ST_COLOR[st] || '#64748b';
    pSvg += sweep >= 359.9
      ? `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${col}" opacity="0.9"/>`
      : `<path d="${arcPath(cx, cy, r, ang, ang+sweep)}" fill="${col}" opacity="0.9"/>`;
    ang += sweep;
  });
  pSvg += `<circle cx="${cx}" cy="${cy}" r="26" fill="rgba(13,31,60,0.85)"/>`;
  pSvg += `<text x="${cx}" y="${cy+5}" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" font-family="inherit">${totalProj}</text>`;
  pSvg += '</svg>';
  let leg = '<div class="pie-legend">';
  statuses.forEach(st => leg += `<div class="pie-legend-item"><span class="pie-dot" style="background:${ST_COLOR[st]||'#64748b'}"></span>${st} (${counts[st]})</div>`);
  leg += '</div>';
  pieBox.querySelector('svg')?.remove();
  pieBox.querySelector('.pie-legend')?.remove();
  pieBox.insertAdjacentHTML('beforeend', pSvg + leg);

  /* Gauge chart */
  const gaugeBox = document.getElementById('chart-gauge');
  const gR = 68, gCx = 90, gCy = 88, sw = 13;
  const fillEnd = 180 + activePct / 100 * 180;
  let gSvg = `<svg width="180" height="105" viewBox="0 0 180 105">`;
  gSvg += `<path d="${arcStroke(gCx,gCy,gR,180,360)}" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="${sw}" stroke-linecap="round"/>`;
  if (activePct > 0) gSvg += `<path d="${arcStroke(gCx,gCy,gR,180,fillEnd)}" fill="none" stroke="#22c55e" stroke-width="${sw}" stroke-linecap="round"/>`;
  gSvg += `<text x="${gCx}" y="${gCy-8}" text-anchor="middle" font-size="24" font-weight="700" fill="#fff" font-family="inherit">${activePct}%</text>`;
  gSvg += `<text x="${gCx}" y="${gCy+12}" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.55)" font-family="inherit">מתוך ${totalProj} פרויקטים</text>`;
  gSvg += '</svg>';
  gaugeBox.querySelector('svg')?.remove();
  gaugeBox.insertAdjacentHTML('beforeend', gSvg);

  /* City chart */
  const cityBox = document.getElementById('chart-cities');
  const cityCounts = {};
  data.forEach(co => co.projects.forEach(p => p.buildings.forEach(b => {
    if (b.city) cityCounts[b.city] = (cityCounts[b.city] || 0) + 1;
  })));
  const topCities = Object.entries(cityCounts).sort((a,b) => b[1]-a[1]).slice(0, 10);
  const maxC = topCities[0]?.[1] || 1;
  let cHtml = '<div style="display:flex;flex-direction:column;gap:8px;padding:4px 0">';
  topCities.forEach(([city, count]) => {
    const pct = Math.max(2, (count / maxC) * 100);
    cHtml += '<div style="display:flex;align-items:center;gap:8px;direction:rtl">'
      + '<span style="flex:0 0 100px;font-size:11px;color:rgba(255,255,255,0.80);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + city + '</span>'
      + '<div style="flex:1;position:relative;height:20px"><div style="width:' + pct + '%;height:100%;background:#8b5cf6;opacity:0.85;border-radius:4px;min-width:4px"></div></div>'
      + '<span style="flex:0 0 28px;font-size:10px;color:rgba(255,255,255,0.55);text-align:left">' + count + '</span>'
      + '</div>';
  });
  cHtml += '</div>';
  cityBox.querySelector('div.city-wrap')?.remove();
  const cwrap = document.createElement('div');
  cwrap.className = 'city-wrap';
  cwrap.innerHTML = cHtml;
  cityBox.appendChild(cwrap);
}

function render() {
  const data = getFiltered();
  const grid = document.getElementById('grid');
  const noRes = document.getElementById('no-results');
  grid.innerHTML = '';

  renderCharts(data);

  if (data.length === 0) {
    noRes.style.display = '';
    document.getElementById('stats').textContent = '';
    return;
  }
  noRes.style.display = 'none';

  let tp = 0, tb = 0;
  data.forEach(co => { tp += co.projects.length; tb += co.totalBuildings; });
  document.getElementById('stats').textContent =
    data.length + ' חברות · ' + tp + ' פרויקטים · ' + tb + ' בניינים';

  data.forEach(co => {
    const card = document.createElement('div');
    card.className = 'card';

    const initials = co.company.replace(/[|]/g,'').trim().slice(0,2);
    card.innerHTML = `
      <div class="card-head">
        <div class="card-avatar">${initials}</div>
        <div>
          <div class="card-title">${co.company}</div>
          <div class="card-stats">
            <span class="card-stat">📁 ${co.projects.length} פרויקטים</span>
            <span class="card-stat">🏠 ${co.totalBuildings} בניינים</span>
          </div>
        </div>
      </div>`;

    const projList = document.createElement('div');
    projList.className = 'proj-list';

    const SHOW = 5;
    co.projects.forEach((p, i) => {
      const row = document.createElement('div');
      row.className = 'proj-row';
      if (i >= SHOW) row.dataset.extra = '1';

      const cityBadge = p.cities.slice(0,1).map(c =>
        `<span class="badge b-city">📍 ${c}</span>`).join('');
      const statusCls = STATUS_CLS[p.status] || 'b-inactive';

      row.innerHTML = `
        ${p.buildings.length ? `<div class="proj-bcount"><span class="bnum">${p.buildings.length}</span>🏠</div>` : '<div class="proj-bcount"></div>'}
        <span class="sdot" style="background:${STATUS_DOT[p.status]||'#94a3b8'}"></span>
        <div style="flex:1;min-width:0">
          <div class="proj-name">${p.name}</div>
          <div class="proj-badges">
            <span class="badge ${statusCls}">${p.status}</span>
            <span class="badge b-type">${p.type}</span>
            ${cityBadge}
          </div>
        </div>`;

      if (i >= SHOW) row.style.display = 'none';

      // click → expand buildings
      if (p.buildings.length) {
        const bldList = document.createElement('div');
        bldList.className = 'bld-list';
        p.buildings.forEach(b => {
          const br = document.createElement('div');
          br.className = 'bld-row';
          br.innerHTML = `<span class="bld-dot"></span><span style="flex:1">${b.name}</span>${b.city ? `<span class="bld-city">${b.city}</span>` : ''}`;
          bldList.appendChild(br);
        });
        row.onclick = () => {
          bldList.classList.toggle('open');
          row.style.background = bldList.classList.contains('open') ? '#eef2ff' : '';
        };
        projList.appendChild(row);
        projList.appendChild(bldList);
      } else {
        projList.appendChild(row);
      }
    });

    // "show more" link
    if (co.projects.length > SHOW) {
      const more = document.createElement('div');
      more.className = 'show-more';
      more.textContent = 'עוד ' + (co.projects.length - SHOW) + ' פרויקטים ›';
      let open = false;
      more.onclick = () => {
        open = !open;
        projList.querySelectorAll('[data-extra]').forEach(r => r.style.display = open ? '' : 'none');
        more.textContent = open ? '‹ פחות' : 'עוד ' + (co.projects.length - SHOW) + ' פרויקטים ›';
      };
      projList.appendChild(more);
    }

    card.appendChild(projList);
    grid.appendChild(card);
  });
}

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.status;
    render();
  });
});

document.getElementById('search').addEventListener('input', function() {
  searchQ = this.value.trim();
  render();
});

render();
</script>
</body>
</html>
